<text x="182" y="200" font-family="monospace" font-size="11" fill="#ce9178"> React </text>
<text x="222" y="200" font-family="monospace" font-size="11" fill="#569cd6">from</text>
<text x="253" y="200" font-family="monospace" font-size="11" fill="#ce9178"> 'react'</text>

<text x="132" y="215" font-family="monospace" font-size="11" fill="#569cd6">const</text>
<text x="172" y="215" font-family="monospace" font-size="11" fill="#9cdcfe"> App</text>
<text x="197" y="215" font-family="monospace" font-size="11" fill="#d4d4d4"> = () =&gt; (</text>

<text x="142" y="230" font-family="monospace" font-size="11" fill="#808080">&lt;</text>
<text x="150" y="230" font-family="monospace" font-size="11" fill="#4ec9b0">div</text>
<text x="174" y="230" font-family="monospace" font-size="11" fill="#9cdcfe"> className</text>
<text x="246" y="230" font-family="monospace" font-size="11" fill="#ce9178">="app"</text>
<text x="290" y="230" font-family="monospace" font-size="11" fill="#808080">&gt;</text>

<text x="152" y="245" font-family="monospace" font-size="11" fill="#A855F7">  &lt;Hero /&gt;</text>
<text x="152" y="260" font-family="monospace" font-size="11" fill="#EC4899">  &lt;Skills /&gt;</text>
<text x="152" y="275" font-family="monospace" font-size="11" fill="#60D394">  &lt;Projects /&gt;</text>
<text x="152" y="290" font-family="monospace" font-size="11" fill="#F7DF1E">  &lt;Contact /&gt;</text>
<text x="142" y="305" font-family="monospace" font-size="11" fill="#808080">&lt;/</text>
<text x="156" y="305" font-family="monospace" font-size="11" fill="#4ec9b0">div</text>
<text x="180" y="305" font-family="monospace" font-size="11" fill="#808080">&gt;</text>
<text x="132" y="320" font-family="monospace" font-size="11" fill="#d4d4d4">)</text>

