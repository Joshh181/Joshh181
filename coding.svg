<svg width="500" height="500" viewBox="0 0 500 500" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Animated coding illustration</title>
<defs>
  <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#161b22"/>
  </linearGradient>
  <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8B6F47"/>
    <stop offset="100%" stop-color="#6B4F2F"/>
  </linearGradient>
  <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#A855F7" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="500" height="500" fill="#0f0e17" rx="14"/>

<!-- Stars -->
<circle cx="40" cy="30" r="1.5" fill="#fff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/></circle>
<circle cx="90" cy="15" r="1" fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
<circle cx="430" cy="22" r="1.5" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/></circle>
<circle cx="470" cy="45" r="1" fill="#fff" opacity="0.3"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
<circle cx="20" cy="70" r="1" fill="#fff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
<circle cx="480" cy="65" r="1.5" fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
<circle cx="65" cy="95" r="1" fill="#A855F7" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
<circle cx="445" cy="88" r="1" fill="#A855F7" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" repeatCount="indefinite"/></circle>
<circle cx="250" cy="455" r="1.5" fill="#fff" opacity="0.4"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.3s" repeatCount="indefinite"/></circle>
<circle cx="150" cy="470" r="1" fill="#A855F7" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.8s" repeatCount="indefinite"/></circle>
<circle cx="370" cy="475" r="1" fill="#fff" opacity="0.3"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.9s" repeatCount="indefinite"/></circle>

<!-- Floating badge top center -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="210" y="30" width="80" height="26" rx="13" fill="#A855F7" opacity="0.95"/>
  <text x="250" y="47" font-family="monospace" font-size="12" fill="white" text-anchor="middle" font-weight="bold">{ coding }</text>
</g>

<!-- Floating code snippet LEFT -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="14" y="78" width="138" height="76" rx="8" fill="#1a1a2e" stroke="#A855F7" stroke-width="1.2" opacity="0.92"/>
  <text x="26" y="100" font-family="monospace" font-size="11" fill="#A855F7">const dev = () => {</text>
  <text x="26" y="118" font-family="monospace" font-size="11" fill="#EC4899">  build(dreams);</text>
  <text x="26" y="136" font-family="monospace" font-size="11" fill="#A855F7">}</text>
  <circle cx="138" cy="87" r="5" fill="#EC4899" opacity="0.9"/>
</g>

<!-- Floating code snippet RIGHT -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,10;0,0" dur="4.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="348" y="70" width="138" height="68" rx="8" fill="#1a1a2e" stroke="#EC4899" stroke-width="1.2" opacity="0.92"/>
  <text x="362" y="92" font-family="monospace" font-size="11" fill="#60D394">&lt;App&gt;</text>
  <text x="362" y="110" font-family="monospace" font-size="11" fill="#F7DF1E">  &lt;Magic /&gt;</text>
  <text x="362" y="128" font-family="monospace" font-size="11" fill="#60D394">&lt;/App&gt;</text>
</g>

<!-- Screen glow -->
<ellipse cx="250" cy="270" rx="160" ry="110" fill="url(#screenGlow)">
  <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
</ellipse>

<!-- Monitor stand -->
<rect x="230" y="388" width="40" height="20" rx="2" fill="#2d2d3a"/>
<rect x="206" y="406" width="88" height="9" rx="4" fill="#2d2d3a"/>

