<svg width="100%" viewBox="0 0 690 690" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Animated coding illustration square</title>
<desc>A desk setup with monitor showing code, keyboard, mouse and coffee, with animated floating code snippets</desc>
<defs>
  <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="100%" stop-color="#161b22"/>
  </linearGradient>
  <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#8B6F47"/>
    <stop offset="100%" stop-color="#6B4F2F"/>
  </linearGradient>
  <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#A855F7" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Background -->
<rect width="680" height="680" fill="#0f0e17" rx="16"/>

<!-- Stars with twinkle -->
<circle cx="60" cy="40" r="1.5" fill="#ffffff" opacity="0.6">
  <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
</circle>
<circle cx="120" cy="20" r="1" fill="#ffffff" opacity="0.4">
  <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.2s" repeatCount="indefinite"/>
</circle>
<circle cx="580" cy="30" r="1.5" fill="#ffffff" opacity="0.5">
  <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
</circle>
<circle cx="620" cy="60" r="1" fill="#ffffff" opacity="0.3">
  <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.7s" repeatCount="indefinite"/>
</circle>
<circle cx="30" cy="90" r="1" fill="#ffffff" opacity="0.5">
  <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
</circle>
<circle cx="650" cy="90" r="1.5" fill="#ffffff" opacity="0.4">
  <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite"/>
</circle>
<circle cx="90" cy="130" r="1" fill="#A855F7" opacity="0.7">
  <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/>
</circle>
<circle cx="600" cy="120" r="1" fill="#A855F7" opacity="0.7">
  <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" repeatCount="indefinite"/>
</circle>
<circle cx="340" cy="600" r="1.5" fill="#ffffff" opacity="0.4">
  <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.3s" repeatCount="indefinite"/>
</circle>
<circle cx="200" cy="620" r="1" fill="#A855F7" opacity="0.5">
  <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.8s" repeatCount="indefinite"/>
</circle>
<circle cx="500" cy="640" r="1" fill="#ffffff" opacity="0.3">
  <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.9s" repeatCount="indefinite"/>
</circle>
<circle cx="100" cy="580" r="1" fill="#ffffff" opacity="0.4">
  <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4.2s" repeatCount="indefinite"/>
</circle>
<circle cx="600" cy="580" r="1.5" fill="#A855F7" opacity="0.5">
  <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.3s" repeatCount="indefinite"/>
</circle>

<!-- Floating code snippet LEFT — float up/down -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-10;0,0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="30" y="120" width="140" height="70" rx="8" fill="#1a1a2e" stroke="#A855F7" stroke-width="1" opacity="0.8"/>
  <text x="44" y="143" font-family="monospace" font-size="10" fill="#A855F7">const dev = () => {</text>
  <text x="44" y="158" font-family="monospace" font-size="10" fill="#EC4899">  build(dreams);</text>
  <text x="44" y="173" font-family="monospace" font-size="10" fill="#A855F7">}</text>
  <circle cx="150" cy="128" r="4" fill="#EC4899" opacity="0.9"/>
</g>

<!-- Floating code snippet RIGHT — float down/up (opposite phase) -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,10;0,0" dur="4.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="510" y="110" width="140" height="60" rx="8" fill="#1a1a2e" stroke="#EC4899" stroke-width="1" opacity="0.8"/>
  <text x="524" y="133" font-family="monospace" font-size="10" fill="#60D394">&lt;App&gt;</text>
  <text x="524" y="148" font-family="monospace" font-size="10" fill="#F7DF1E">  &lt;Magic /&gt;</text>
  <text x="524" y="163" font-family="monospace" font-size="10" fill="#60D394">&lt;/App&gt;</text>
</g>

<!-- Floating badge top — gentle bounce -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="290" y="55" width="100" height="30" rx="15" fill="#A855F7" opacity="0.9"/>
  <text x="340" y="74" font-family="monospace" font-size="11" fill="white" text-anchor="middle" font-weight="bold">{ coding }</text>
</g>

<!-- Screen glow halo — pulse -->
<ellipse cx="340" cy="370" rx="200" ry="140" fill="url(#screenGlow)">
  <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
</ellipse>

<!-- Monitor stand -->
<rect x="320" y="520" width="40" height="24" rx="2" fill="#2d2d3a"/>
<rect x="290" y="542" width="100" height="10" rx="4" fill="#2d2d3a"/>

<!-- Monitor body -->
<rect x="140" y="210" width="400" height="220" rx="12" fill="#2d2d3a" stroke="#3d3d4a" stroke-width="1.5"/>
<!-- Screen -->
<rect x="152" y="222" width="376" height="196" rx="6" fill="url(#screenGrad)"/>

<!-- IDE Code on screen -->
<text x="170" y="248" font-family="monospace" font-size="10" fill="#569cd6">import</text>
<text x="212" y="248" font-family="monospace" font-size="10" fill="#ce9178"> React </text>
<text x="252" y="248" font-family="monospace" font-size="10" fill="#569cd6">from</text>
<text x="280" y="248" font-family="monospace" font-size="10" fill="#ce9178"> 'react'</text>

<text x="170" y="266" font-family="monospace" font-size="10" fill="#569cd6">const</text>
<text x="204" y="266" font-family="monospace" font-size="10" fill="#9cdcfe"> App</text>
<text x="226" y="266" font-family="monospace" font-size="10" fill="#d4d4d4"> = () => (</text>

<text x="180" y="284" font-family="monospace" font-size="10" fill="#808080">&lt;</text>
<text x="188" y="284" font-family="monospace" font-size="10" fill="#4ec9b0">div</text>
<text x="210" y="284" font-family="monospace" font-size="10" fill="#9cdcfe"> className</text>
<text x="274" y="284" font-family="monospace" font-size="10" fill="#d4d4d4">=</text>
<text x="282" y="284" font-family="monospace" font-size="10" fill="#ce9178">"app"</text>
<text x="318" y="284" font-family="monospace" font-size="10" fill="#808080">&gt;</text>

<text x="190" y="302" font-family="monospace" font-size="10" fill="#A855F7">  &lt;Hero /&gt;</text>
<text x="190" y="320" font-family="monospace" font-size="10" fill="#EC4899">  &lt;Skills /&gt;</text>
<text x="190" y="338" font-family="monospace" font-size="10" fill="#60D394">  &lt;Projects /&gt;</text>
<text x="190" y="356" font-family="monospace" font-size="10" fill="#F7DF1E">  &lt;Contact /&gt;</text>

<!-- Blinking cursor -->
<rect x="170" y="368" width="7" height="13" fill="#A855F7">
  <animate attributeName="opacity" values="1;1;0;0;1" dur="1.2s" repeatCount="indefinite"/>
</rect>

<!-- Screen status bar -->
<rect x="152" y="400" width="376" height="18" rx="0" fill="#1e1e1e"/>
<circle cx="168" cy="409" r="3.5" fill="#60D394">
  <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="178" y="413" font-family="monospace" font-size="9" fill="#808080">main ● TypeScript JSX</text>
<text x="458" y="413" font-family="monospace" font-size="9" fill="#808080">Ln 42, Col 18</text>

<!-- Desk surface -->
<rect x="80" y="558" width="520" height="34" rx="6" fill="url(#deskGrad)"/>
<rect x="80" y="558" width="520" height="5" rx="2" fill="#A07850"/>

<!-- Keyboard -->
<rect x="210" y="552" width="260" height="20" rx="4" fill="#1a1a2e" stroke="#3d3d4a" stroke-width="1"/>
<rect x="220" y="557" width="18" height="9" rx="2" fill="#2d2d3a"/>
<rect x="242" y="557" width="18" height="9" rx="2" fill="#2d2d3a"/>
<rect x="264" y="557" width="18" height="9" rx="2" fill="#A855F7" opacity="0.6">
  <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
</rect>
<rect x="286" y="557" width="18" height="9" rx="2" fill="#2d2d3a"/>
<rect x="308" y="557" width="18" height="9" rx="2" fill="#2d2d3a"/>
<rect x="330" y="557" width="18" height="9" rx="2" fill="#EC4899" opacity="0.6">
  <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
</rect>
<rect x="352" y="557" width="18" height="9" rx="2" fill="#2d2d3a"/>
<rect x="374" y="557" width="18" height="9" rx="2" fill="#2d2d3a"/>
<rect x="228" y="567" width="206" height="6" rx="2" fill="#2d2d3a"/>

<!-- Mouse -->
<rect x="482" y="549" width="32" height="26" rx="9" fill="#1a1a2e" stroke="#3d3d4a" stroke-width="1"/>
<line x1="498" y1="549" x2="498" y2="565" stroke="#3d3d4a" stroke-width="1"/>
<rect x="485" y="552" width="12" height="9" rx="3" fill="#2d2d3a"/>

<!-- Coffee cup -->
<rect x="128" y="536" width="32" height="30" rx="4" fill="#2d2d3a" stroke="#3d3d4a" stroke-width="1"/>
<rect x="128" y="536" width="32" height="10" rx="4" fill="#A855F7" opacity="0.7"/>
<path d="M160 546 Q172 546 172 553 Q172 560 160 560" fill="none" stroke="#3d3d4a" stroke-width="1.5"/>
<!-- Steam wisps -->
<path d="M136 533 Q138 527 136 521" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round">
  <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2s" repeatCount="indefinite"/>
</path>
<path d="M144 531 Q146 524 144 518" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round">
  <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
</path>

<!-- Floating tags bottom left — float -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="40" y="450" width="76" height="24" rx="12" fill="#1a1a2e" stroke="#EC4899" stroke-width="1"/>
  <text x="78" y="466" font-family="monospace" font-size="10" fill="#EC4899" text-anchor="middle">❤ Flutter</text>
</g>
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="36" y="490" width="88" height="24" rx="12" fill="#1a1a2e" stroke="#60D394" stroke-width="1"/>
  <text x="80" y="506" font-family="monospace" font-size="10" fill="#60D394" text-anchor="middle">⚡ Supabase</text>
</g>

<!-- Floating tags bottom right — float -->
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,0" dur="3.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="556" y="445" width="88" height="24" rx="12" fill="#1a1a2e" stroke="#F7DF1E" stroke-width="1"/>
  <text x="600" y="461" font-family="monospace" font-size="10" fill="#F7DF1E" text-anchor="middle">★ Figma</text>
</g>
<g>
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="4.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  <rect x="548" y="488" width="100" height="24" rx="12" fill="#1a1a2e" stroke="#A855F7" stroke-width="1"/>
  <text x="598" y="504" font-family="monospace" font-size="10" fill="#A855F7" text-anchor="middle">✦ Open Source</text>
</g>

<!-- Bottom label -->
<text x="340" y="648" font-family="monospace" font-size="11" fill="#555566" text-anchor="middle">joshh181 • always building</text>
</svg>
