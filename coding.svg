<rect x="108" y="164" width="72" height="14" rx="4" fill="#2d2d3a"/>
<text x="144" y="175" font-family="monospace" font-size="9" fill="#9cdcfe" text-anchor="middle">App.tsx</text>
<circle cx="174" cy="171" r="3" fill="#1e1e1e"/>

