<svg width="1200" height="350" viewBox="0 0 1200 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0C10" />
      <stop offset="50%" stop-color="#120D1D" />
      <stop offset="100%" stop-color="#1F0F3D" />
    </linearGradient>
    
    <!-- Text / Object Glow Gradients -->
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#D946EF" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>

    <!-- Drop Shadows / Glow Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="16" />
  
  <!-- Sleek Tech Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" rx="16" />

  <!-- Ambient Light Glows (Dynamic floating shapes) -->
  <circle cx="950" cy="175" r="120" fill="#EC4899" fill-opacity="0.15" filter="url(#glow)">
    <animate attributeName="cy" values="140;200;140" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="80" r="100" fill="#8B5CF6" fill-opacity="0.15" filter="url(#glow)">
    <animate attributeName="cx" values="180;220;180" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Abstract Geometry: Glowing Circuit Path -->
  <path d="M 650 350 L 800 200 L 1100 200 M 780 220 L 900 100 L 1200 100" stroke="url(#neon-glow)" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="10 5" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="15s" repeatCount="indefinite"/>
  </path>
  
  <!-- Glowing Hexagon on the right -->
  <g transform="translate(900, 75)">
    <!-- Main central glowing logo/icon -->
    <polygon points="100,20 180,70 180,150 100,200 20,150 20,70" fill="none" stroke="url(#neon-glow)" stroke-width="3" filter="url(#glow)" transform="rotate(30, 100, 110)">
      <animateTransform attributeName="transform" type="rotate" from="0 100 110" to="360 100 110" dur="30s" repeatCount="indefinite"/>
    </polygon>
    <!-- Code symbol in center -->
    <text x="60" y="125" fill="#FFFFFF" font-family="'Fira Code', monospace, Courier" font-size="40" font-weight="bold" opacity="0.9">&lt;/&gt;</text>
  </g>

  <!-- TYPOGRAPHY SECTION (LEFT ALIGNED) -->
  <!-- Main Name -->
  <text x="80" y="145" fill="url(#neon-glow)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif" font-size="58" font-weight="900" letter-spacing="1">JOSHUA LUMACTOD</text>
  
  <!-- Subheading 1 -->
  <text x="82" y="200" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif" font-size="22" font-weight="600" opacity="0.9" letter-spacing="1.5">ASPIRING DEVELOPER  |  STUDENT  |  BUILDER</text>
  
  <!-- Subheading 2 -->
  <text x="82" y="240" fill="#3ECF8E" font-family="'Fira Code', Courier, monospace" font-size="16" font-weight="500" letter-spacing="1">~ const build = (ideas) => real_world_solutions;</text>

</svg>
